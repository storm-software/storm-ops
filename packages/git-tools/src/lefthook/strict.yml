#                                                                                #
#                          Lefthook configuration file:                          #
#   This file is used to configure Lefthook, a tool for managing Git hooks.      #
#                                                                                #
#   https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md   #

$schema: https://raw.githubusercontent.com/evilmartians/lefthook/refs/heads/master/schema.json
assert_lefthook_installed: true
colors: true
no_tty: false
min_version: "1.5.0"
extends:
  - ./minimal.yml
  - ./recommended.yml

pre-commit:
  commands:
    lint:
      files: git diff --name-only HEAD @{push}
      glob:
        - "*.js"
        - "*.ts"
        - "*.cjs"
        - "*.mjs"
        - "*.d.cts"
        - "*.d.mts"
        - "*.jsx"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.yaml"
        - "*.yml"
        - "*.md"
        - "*.mdx"
        - "*.markdown"
        - "*.css"
        - "*.scss"
        - "*.sass"
        - "*.less"
        - "*.stylus"
        - "*.graphql"
        - "*.gql"
        - "*.xml"
        - "*.svg"
        - "*.env"
        - ".env.{local,development,test,production,staging}"
      run: pnpm lint {files}
      stage_fixed: true

pre-push:
  piped: true
  commands:
    prettier:
      files: git diff --name-only HEAD @{push}
      glob: "!**/generators/*/files/**/*"
      run: "pnpm exec prettier {files} --write --ignore-unknown --no-error-on-unmatched-pattern --cache && git update-index"
      stage_fixed: true
    sherif:
      files: git diff --name-only HEAD @{push}
      glob: "**/*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: pnpm exec sherif -i typescript react react-dom --files {files} --cache
      stage_fixed: true
