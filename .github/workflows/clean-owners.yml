---
name: Weekly codeowners cleanup
on:
  workflow_dispatch:
  schedule:
    - cron: "3 2 1 * *"

permissions:
  contents: read

jobs:
  clean-owners:
    name: clean-owners
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Run clean-owners action
        uses: github-community-projects/cleanowners@07716eab01732270dbb265950ee33434786c3213 # v2.1.10
        env:
          GH_TOKEN: ${{ secrets.STORM_BOT_GITHUB_TOKEN }}
          ORGANIZATION: storm-software
